name: Deploy To App Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure project
        run: gcloud config set project ${{ fromJSON(secrets.GCP_CREDENTIALS).project_id }}

      - name: Ensure deployment files exist
        run: |
          test -f architecture.html
          if [ ! -f app.yaml ]; then
            cat > app.yaml <<'YAML'
            runtime: python311

            handlers:
              - url: /
                static_files: architecture.html
                upload: architecture.html
                secure: always

              - url: /(.*)
                static_files: \1
                upload: (.*)
                secure: always
            YAML
          fi

      - name: Deploy to App Engine
        run: gcloud app deploy app.yaml --quiet
