name: Deploy To App Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure project
        run: gcloud config set project ${{ fromJSON(secrets.GCP_CREDENTIALS).project_id }}

      - name: Ensure deployment files exist
        shell: bash
        run: |
          test -f "${GITHUB_WORKSPACE}/architecture.html"
          if [ ! -f "${GITHUB_WORKSPACE}/app.yaml" ]; then
            printf '%s\n' \
              'runtime: python311' \
              '' \
              'handlers:' \
              '  - url: /' \
              '    static_files: architecture.html' \
              '    upload: architecture.html' \
              '    secure: always' \
              '' \
              '  - url: /(.*)' \
              '    static_files: \1' \
              '    upload: (.*)' \
              '    secure: always' \
              > "${GITHUB_WORKSPACE}/app.yaml"
          fi

      - name: Debug deployment files
        run: |
          echo "Workspace: ${GITHUB_WORKSPACE}"
          pwd
          ls -la "${GITHUB_WORKSPACE}"
          test -f "${GITHUB_WORKSPACE}/app.yaml"
          test -f "${GITHUB_WORKSPACE}/architecture.html"
          echo "--- app.yaml ---"
          cat "${GITHUB_WORKSPACE}/app.yaml"

      - name: Deploy to App Engine
        run: gcloud app deploy "${GITHUB_WORKSPACE}/app.yaml" --quiet
